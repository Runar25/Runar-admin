<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RÚNAR | SHRINE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap');
        body { background: #050505; color: #fff; font-family: 'Cormorant Garamond', serif; padding: 40px 20px; display: flex; justify-content: center; }
        .shrine { max-width: 600px; width: 100%; }
        h1 { font-family: 'Cinzel', serif; color: #d4af37; text-align: center; letter-spacing: 4px; }
        .card { background: #0d0d0d; border: 1px solid #222; padding: 30px; margin-top: 30px; }
        select, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; margin-bottom: 20px; font-family: inherit; font-size: 1.2em; box-sizing: border-box; }
        button { width: 100%; padding: 20px; cursor: pointer; font-family: 'Cinzel', serif; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .btn-scan { background: transparent; color: #d4af37; border: 1px dashed #d4af37; margin-bottom: 20px; }
        .btn-save { background: #d4af37; color: #000; border: none; font-weight: bold; }
        .status { text-align: center; margin-top: 20px; color: #888; text-transform: uppercase; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="shrine">
    <h1>KNOWLEDGE SHRINE</h1>

    <div class="card">
        <button class="btn-scan" onclick="document.getElementById('file-input').click()">📷 Scan Book Page</button>
        <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="processPage(this)">

        <select id="rune-select">
<option value="Fehu">Fehu (Wealth)</option>
<option value="Uruz">Uruz (Strength)</option>
<option value="Thurisaz">Thurisaz (Chaos/Protection)</option>
<option value="Ansuz">Ansuz (Wisdom/Voice)</option>
<option value="Raido">Raido (Journey)</option>
<option value="Kenaz">Kenaz (Fire/Knowledge)</option>
<option value="Gebo">Gebo (Gift)</option>
<option value="Wunjo">Wunjo (Joy)</option>
<option value="Hagalaz">Hagalaz (Hail/Destruction)</option>
<option value="Nauthiz">Nauthiz (Need/Resistance)</option>
<option value="Isa">Isa (Ice/Stillness)</option>
<option value="Jera">Jera (Harvest/Year)</option>
<option value="Eihwaz">Eihwaz (Yew/Endurance)</option>
<option value="Perthro">Perthro (Fate/Mystery)</option>
<option value="Algiz">Algiz (Elk/Protection)</option>
<option value="Sowilo">Sowilo (Sun/Success)</option>
<option value="Tiwaz">Tiwaz (Justice/Warrior)</option>
<option value="Berkano">Berkano (Birth/Growth)</option>
<option value="Ehwaz">Ehwaz (Horse/Trust)</option>
<option value="Mannaz">Mannaz (Human/Self)</option>
<option value="Laguz">Laguz (Water/Flow)</option>
<option value="Ingwaz">Ingwaz (Fertility/Peace)</option>
<option value="Dagaz">Dagaz (Day/Dawn)</option>
<option value="Othala">Othala (Ancestry/Home)</option>
        </select>

        <textarea id="output-text" style="height: 250px;" placeholder="Rúnar's voice will emerge here..."></textarea>
        
        <button class="btn-save" onclick="saveWisdom()">Commit to Memory</button>
        <div id="status" class="status">Ready for wisdom</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://pmitxjvkeovijreepror.supabase.co';
    const SUPABASE_KEY = 'sb_secret_2W4Qp50gd0dl1VMFRJ6t4g_uz9h9p_p';
    const GEMINI_KEY = 'AIzaSyCuJS8296zWHM0OaI1HXjBAdmfnQmpJj0c';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function processPage(input) {
        if (!input.files[0]) return;
        const status = document.getElementById('status');
        status.innerText = "Rúnar is reading...";

        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Extract text from this book page and rewrite it in your voice as Rúnar, a spiritual Norse guide. Keep the core meaning but make it poetic and grounded. Respond only with the processed text." },
                                { inline_data: { mime_type: input.files[0].type, data: base64 } }
                            ]
                        }]
                    })
                });
                const data = await res.json();
                document.getElementById('output-text').value = data.candidates[0].content.parts[0].text;
                status.innerText = "Wisdom processed.";
            } catch (e) { status.innerText = "Ritual failed."; }
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function saveWisdom() {
        const text = document.getElementById('output-text').value;
        const rune = document.getElementById('rune-select').value;
        if (!text) return;

        const { error } = await supabaseClient.from('knowledge_base').insert([{ 
            title: rune, 
            content: text,
            rune: rune,
            category: 'wisdom'
        }]);

        document.getElementById('status').innerText = error ? "Error saving." : "Saved to memory.";
        if (!error) document.getElementById('output-text').value = "";
    }
</script>

</body>
</html>
